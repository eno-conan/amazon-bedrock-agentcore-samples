version: "3"

tasks:
  setup:
    desc: "依存関係インストール + pre-commit フック設定"
    cmds:
      - uv sync
      - uv run pre-commit install

  check:
    desc: "lint → format → typecheck を順に実行"
    cmds:
      - task: lint
      - task: format
      - task: typecheck

  lint:
    desc: "ruff でリント（自動修正あり）"
    cmds:
      - uv run ruff check --fix

  format:
    desc: "ruff でフォーマット"
    cmds:
      - uv run ruff format

  typecheck:
    desc: "pyright で型チェック"
    cmds:
      - uv run pyright

  test:
    desc: "pytest でテスト実行"
    cmds:
      - uv run pytest

  setup:cognito:
    desc: "Cognito User Pool を作成（AWS リソース作成）"
    cmds:
      - uv run python -m ntt_data_agent.setup.cognito

  setup:mock-api:
    desc: "モックAPI Lambda + API Gateway をデプロイ（AWS リソース作成）"
    cmds:
      - uv run python -m ntt_data_agent.setup.mock_api

  setup:agentcore:
    desc: "AgentCore Identity / Gateway を設定（AWS リソース作成）"
    cmds:
      - uv run python -m ntt_data_agent.setup.agentcore

  agent:dev:
    desc: "エージェントをローカルで起動（.env から環境変数をロード）"
    cmds:
      - uv run --env-file .env python -m ntt_data_agent.agent.main

  agent:invoke:
    desc: "ローカルサーバーへテストリクエストを送信（例: task agent:invoke -- 顧客一覧を教えて）"
    cmds:
      - uv run --env-file .env python scripts/invoke.py {{.CLI_ARGS}}

  infra:synth:
    desc: "CloudFormation テンプレートを生成して検証（デプロイしない）"
    cmds:
      - cdk synth

  infra:diff:
    desc: "現在のデプロイ済みスタックとの差分を表示"
    cmds:
      - cdk diff --all

  infra:deploy:
    desc: "全スタックをデプロイ（Storage → Cognito → MockApi の順）"
    cmds:
      - cdk deploy --all --require-approval never

  infra:destroy:
    desc: "全スタックのリソースを削除"
    cmds:
      - cdk destroy --all --force
